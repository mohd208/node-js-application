name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  placeholder:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Echo start
        run: echo "Starting CI pipeline for node-js-application-for-testing-purposes"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Lint (fails on unused variables/functions)
        run: npm run lint

      - name: Echo test placeholder
        run: echo "Test steps will go here"

      - name: Echo done
        run: echo "CI pipeline placeholder complete"
